.card.pl .card-v{font-size:19px;color:#fcd34d}

.card.red .card-v{color:#f87171}.card.amber .card-v{color:#fbbf24}

  if(l==='venda')return '<span class="rec rv">Venda</span>';
  if(l.includes('não atrativa'))return '<span class="rec rv">Não Atr.</span>';
  if(l==='compra'||l==='atrativa')return '<span class="rec rc">'+v+'</span>';
  if(l.includes('sem cobertura'))return '<span class="rx">s/cob.</span>';
  return '<span class="rec rn">'+v+'</span>';}
function sC2(s,ti){const f={[LT_V]:'fv',[LT_E]:'fe',[LT_M]:'fm'}[ti]||'fm';
  let b='';for(let i=0;i<4;i++)b+=`<span class="sb${i<s?' '+f:''}"></span>`;
  return `<div class="sb-wrap"><div class="sbs">${b}</div><span class="sn">${s}/4</span></div>`;}
function bC(ti){return{[LT_V]:'<span class="badge bv">🔴 VENDA</span>',[LT_E]:'<span class="badge be">🟡 ESTRUT.</span>',[LT_M]:'<span class="badge bm">🟢 MANTER</span>'}[ti]||'';}
function aC(isA,ai){const t=LAU[ai]||'';if(isA&&t)return `<span class="ab" title="${t}">🤖 ${t}</span>`;if(isA)return '<span class="ab">🤖 Auto</span>';return '<span class="am">Manual</span>';}
function rvC(r1,r2){let h='';if(r1===1)h+='<span class="rvb">🏆 RV 1.0</span> ';if(r2===1)h+='<span class="rvb">🏆 RV 2.0</span>';return h||'<span class="am">—</span>';}
function eC(i){const e=LES[i]||'';if(e==='—'||!e)return '<span class="en">—</span>';return e.split(' · ').map(p=>`<span class="et">${p}</span>`).join(' ');}
function rv(r,col){switch(col){case 5:return LP[r[5]];case 17:return LT[r[17]];case 19:return LAU[r[19]];case 22:return LES[r[22]];default:return r[col];}}
function bldHd(){document.getElementById('thr').innerHTML=COLS.map(c=>c.k===null?`<th>${c.l}</th>`:`<th onclick="sBy(${c.k})" data-c="${c.k}">${c.l}<span class="ar"></span></th>`).join('');}
function apF(){
  const tip=document.getElementById('ft').value,aut=document.getElementById('fa').value,
    prod=document.getElementById('fp').value,q=document.getElementById('fs').value.toLowerCase().trim();
  const tiI=tip!==''?parseInt(tip):-1,prI=prod!==''?parseInt(prod):-1;
  const bnIdx=LB.map((v,i)=>v.toLowerCase().includes('não atrativa')?i:-1).filter(i=>i>=0);
  const evI=LE.indexOf('Venda'),lvI=LL.indexOf('Venda');
  filtered=DATA.filter(r=>{
    if(tiI>=0&&r[17]!==tiI)return false;
    if(prI>=0&&r[5]!==prI)return false;
    if(aut==='com'&&!r[18])return false;
    if(aut==='sem'&&r[18])return false;
    if(aut==='elv'&&r[13]!==evI)return false;
    if(aut==='lev'&&r[14]!==lvI)return false;
    if(aut==='bna'&&!bnIdx.includes(r[12]))return false;
    if(q&&!(r[4].toLowerCase().includes(q)||r[3].includes(q)))return false;
    return true;});
  if(sC>=0)filtered.sort((a,b)=>{let x=rv(a,sC),y=rv(b,sC);
    if(typeof x==='string')x=x.toLowerCase();if(typeof y==='string')y=y.toLowerCase();
    if(x==null)x=sD>0?Infinity:-Infinity;if(y==null)y=sD>0?Infinity:-Infinity;
    return x<y?-sD:x>y?sD:0;});
  pg=1;rnd();upd();}
function rnd(){
  const tb=document.getElementById('tb'),em=document.getElementById('em');
  if(!filtered.length){tb.innerHTML='';em.style.display='block';document.getElementById('pag').innerHTML='';
    document.getElementById('cnt').innerHTML='<b>0</b> resultados';return;}
  em.style.display='none';
  const tot=filtered.length,pages=Math.ceil(tot/pp);if(pg>pages)pg=pages;
  const st=(pg-1)*pp,sl=filtered.slice(st,st+pp);
  const rcM={[LT_V]:'r-v',[LT_E]:'r-e',[LT_M]:'r-m'};
  tb.innerHTML=sl.map((r,i)=>{const gi=DATA.indexOf(r);
    return `<tr class="${rcM[r[17]]||'r-m'}">
      <td class="cm" style="color:#94a3b8">${st+i+1}</td>
      <td class="cc">${r[3]}</td><td class="ca">${r[4]}</td>
      <td style="font-size:11px">${LP[r[5]]}</td>
      <td class="cr ${r[6]==null?'':r[6]>=0?'p':'n'}">${r[6]==null?'—':fN(r[6])+'%'}</td>
      <td class="cm">${r[7]==null?'—':'R$'+fN(r[7])}</td>
      <td class="cm">${r[8]==null?'—':'R$'+fN(r[8])}</td>
      <td class="cm" style="font-weight:600">${fPL(r[9])}</td>
      <td class="cm">${r[10]==null?'—':'R$'+fN(r[10])}</td>
      <td>${rC(r[12],LB)}</td><td>${rC(r[13],LE)}</td><td>${rC(r[14],LL)}</td><td>${rC(r[15],LXP)}</td>
      <td>${sC2(r[16],r[17])}</td><td>${bC(r[17])}</td>
      <td>${aC(r[18],r[19])}</td><td>${rvC(r[20],r[21])}</td>
      <td class="ec">${eC(r[22])}</td>
      <td><button class="btn-a" onclick="oM(${gi})">💬 Ação</button></td>
    </tr>`;}).join('');
  document.getElementById('cnt').innerHTML=`<b>${st+1}–${Math.min(st+pp,tot)}</b> de <b>${tot.toLocaleString('pt-BR')}</b>`;
  bldPag(pages);}
function bldPag(pages){if(pages<=1){document.getElementById('pag').innerHTML='';return;}
  let h=`<button onclick="gP(1)" ${pg===1?'disabled':''}>«</button><button onclick="gP(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;
  let s=Math.max(1,pg-2),e=Math.min(pages,pg+2);
  if(s>1)h+=`<button onclick="gP(1)">1</button>`+(s>2?'<span class="pi">…</span>':'');
  for(let i=s;i<=e;i++)h+=`<button class="${i===pg?'active':''}" onclick="gP(${i})">${i}</button>`;
  if(e<pages)h+=(e<pages-1?'<span class="pi">…</span>':'')+`<button onclick="gP(${pages})">${pages}</button>`;
  h+=`<button onclick="gP(${pg+1})" ${pg===pages?'disabled':''}>›</button><button onclick="gP(${pages})" ${pg===pages?'disabled':''}>»</button>`;
  h+=`<span class="pi">Pág. ${pg}/${pages}</span>`;document.getElementById('pag').innerHTML=h;}
function gP(p){pg=p;rnd();window.scrollTo({top:document.querySelector('.twrap').offsetTop-80,behavior:'smooth'});}
function upd(){const pl=filtered.reduce((s,r)=>s+r[9],0),
  v=filtered.filter(r=>r[17]===LT_V).length,e=filtered.filter(r=>r[17]===LT_E).length,
  m=filtered.filter(r=>r[17]===LT_M).length,au=filtered.filter(r=>r[18]).length;
  document.getElementById('kpl').textContent=fPL(pl);
  document.getElementById('kv').textContent=v.toLocaleString('pt-BR');
  document.getElementById('ke').textContent=e.toLocaleString('pt-BR');
  document.getElementById('km').textContent=m.toLocaleString('pt-BR');
  document.getElementById('ka').textContent=au.toLocaleString('pt-BR');
  document.getElementById('cpl').textContent=fPL(pl);}
function oM(gi){const r=DATA[gi],tipo=LT[r[17]],ativo=r[4],rent=r[6],alvo=r[10],pct=r[11];
  const enc=ENCARTE[ativo];let sh='',si='';
  if(tipo==='VENDA'){const cs=(LE[r[13]]==='Venda'?1:0)+(LL[r[14]]==='Venda'?1:0);
    sh=`<div class="scr sv">"Olá! Seu ativo <b>${ativo}</b> acumula <b>${rent==null?'—':fN(rent)+'%'}</b> de lucro desde a entrada${cs>0?` e <b>${cs}</b> casa(s) recomendam venda`:''}.${pct!=null?` Preço atual em <b>${fN(pct,1)}%</b> do alvo Bloomberg de R$${fN(alvo)}, ${pct>=100?'já acima do teto projetado':'próximo do teto'}.`:''} Momento oportuno para <b>realização de lucro</b>. Posso apresentar onde realocar?"</div>`;
  }else if(tipo==='ESTRUTURADO'){const pn=enc?enc.prod:LES[r[22]].split(' · ')[0];
    const sd=SD[pn]||'estrutura de proteção com participação na alta';
    let ex='';
    if(enc){if(enc.prod==='Collar UI'||enc.prod==='Collar')ex=`Ganha até <b>${fN(enc.ganho,0)}%</b> na alta${enc.barreira?` (barreira ${fN(enc.barreira,0)}%)`:''}. Proteção de <b>${enc.prot}%</b> na queda.`;
      else if(enc.prod==='Smart Coupon')ex=`Cupom de <b>${fN(enc.cupom||enc.ganho,1)}%</b> se ${ativo} não cair mais de <b>${fN(enc.barreira,0)}%</b>.`;
      else if(enc.prod==='POP')ex=`Metade da alta ilimitada de <b>${ativo}</b>, proteção de <b>${enc.prot}%</b> na queda.`;
      else if(enc.prod.startsWith('Fence'))ex=`Até <b>${fN(enc.ganho,0)}%</b> na alta, proteção parcial de <b>${enc.prot}%</b> na queda.`;
      else if(enc.prod==='Put Spread')ex=`Hedge de <b>${ativo}</b> para queda de até 20%, prêmio de 5%.`;
      else if(enc.prod==='Alocação Protegida')ex=`Alta ilimitada com <b>${enc.prot}%</b> de proteção do capital.`;
      si=`<div class="si"><b>${enc.prod}</b> · Prazo ${enc.prazo}m · Fee AAI ${fN(enc.fee,2)}%<br>${ex}</div>`;}
    sh=`<div class="scr se">"Olá! Você tem <b>${ativo}</b>${rent!=null&&rent>=20?` com <b>${fN(rent)}%</b> de lucro`:''}. Em vez de vender, podemos montar um <b>${pn}</b>: ${sd}. ${enc&&enc.prot?`Mantém o papel com proteção de ${enc.prot}% na queda`:'Protege a posição'} e segue participando da alta. Posso enviar a proposta?"</div>${si}`;
  }else sh=`<div class="scr">"<b>${ativo}</b> sem sinais de saída no momento. Recomenda-se <b>acompanhar</b>."</div>`;
  let al='';
  if(r[18]&&LAU[r[19]])al+=`<div class="alrt aa">⚠️ <span><b>Carteira automatizada:</b> ${LAU[r[19]]}. Verificar compatibilidade.</span></div>`;
  if(r[20]===1)al+=`<div class="alrt ar">🏆 <span><b>Elegível Missão RV 1.0.</b> Não esqueça de registrar.</span></div>`;
  if(r[21]===1)al+=`<div class="alrt ar">🏆 <span><b>Elegível Missão RV 2.0.</b> Não esqueça de registrar.</span></div>`;
  document.getElementById('mod').innerHTML=`
    <div class="mhd"><div class="mhl"><span class="mtag">${tipo==='VENDA'?'🔴 Venda Direta':tipo==='ESTRUTURADO'?'🟡 Produto Estruturado':'🟢 Acompanhar'}</span>
      <span class="mttl">${ativo}</span></div><button class="mcls" onclick="cM()">×</button></div>
    <div class="mbdy"><div class="mgrid">
      <div class="mcell"><div class="mcl">Cliente</div><div class="mcv">${r[3]}</div></div>
      <div class="mcell"><div class="mcl">PL da Posição</div><div class="mcv">${fPL(r[9])}</div></div>
      <div class="mcell"><div class="mcl">Rentabilidade</div><div class="mcv">${r[6]==null?'—':fN(r[6])+'%'}</div></div>
      <div class="mcell"><div class="mcl">Cotação / Alvo BBG</div><div class="mcv">${r[8]==null?'—':'R$'+fN(r[8])} / ${r[10]==null?'—':'R$'+fN(r[10])}</div></div>
    </div>
    <div class="msc"><div class="msh">💬 Script de Abordagem</div>${sh}${al}</div>
    <div class="cn">Material interno. Resultados brutos — custos (0,27% registro + 0,015% permanência) e IR 15% não inclusos.</div>
    </div>`;
  document.getElementById('ov').classList.add('show');}
function cM(){document.getElementById('ov').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cM();});
function sBy(k){if(sC===k)sD*=-1;else{sC=k;sD=-1;}
  document.querySelectorAll('thead th').forEach(th=>{th.classList.remove('asc','desc');if(+th.dataset.c===k)th.classList.add(sD>0?'asc':'desc');});apF();}
function expCSV(){
  const H=['#','Cliente','Ativo','Produto','Rentab(%)','PrecoMedio','UltCotacao','VolAtual','AlvoBBG','PctAlvo','Benndorf','Eleven','Levante','XP','Score','TipoAcao','Automatizada','TipoCarteira','MissaoRV1','MissaoRV2','Estruturado'];
  const rows=filtered.map((r,i)=>[i+1,r[3],r[4],LP[r[5]],r[6]??'',r[7]??'',r[8]??'',r[9],r[10]??'',r[11]??'',LB[r[12]],LE[r[13]],LL[r[14]],LXP[r[15]],r[16],LT[r[17]],r[18]?'Sim':'Não',LAU[r[19]]||'',r[20]===1?'Sim':'Não',r[21]===1?'Sim':'Não',LES[r[22]]]);
  const csv=[H,...rows].map(row=>row.map(v=>{v=String(v);return v.includes(',')||v.includes('"')?'"'+v.replace(/"/g,'""')+'"':v}).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='painel_A38266.csv';a.click();}
['ft','fa','fp'].forEach(id=>document.getElementById(id).addEventListener('change',apF));
document.getElementById('fs').addEventListener('input',apF);
bldHd();apF();

</script>
